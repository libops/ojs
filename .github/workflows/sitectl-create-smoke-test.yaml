name: sitectl-create-smoke-test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sitectl-create-smoke-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  create:
    name: sitectl create ojs ${{ matrix.create_definition }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - create_definition: default
            create_args: ""
    uses: libops/.github/.github/workflows/sitectl-create-smoke-test.yaml@8cdff451294d4663695a9f326ec3a38ddd87f573 # main
    with:
      plugin: ojs
      create-definition: ${{ matrix.create_definition }}
      create-args: ${{ matrix.create_args }}
