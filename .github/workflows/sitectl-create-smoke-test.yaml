name: sitectl-create-smoke-test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sitectl-create-smoke-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  create:
    name: sitectl create ojs ${{ matrix.create_definition }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - create_definition: default
            create_args: ""
    uses: libops/.github/.github/workflows/sitectl-create-smoke-test.yaml@5f44a8c8d157bb7e5cf6d9e1c98847a604e87455 # main
    with:
      plugin: ojs
      create-definition: ${{ matrix.create_definition }}
      create-args: ${{ matrix.create_args }}
      packages: sitectl sitectl-ojs
      package-versions: sitectl=1.0.0 sitectl-ojs=1.0.0
      allow-unversioned-packages: false
