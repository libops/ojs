---
x-common: &common
  restart: unless-stopped
  networks:
    default:

networks:
  default:
volumes:
  acme-data: {}
  mariadb-data: {}
  ojs-cache: {}
  ojs-files: {}
  ojs-public: {}

secrets:
  DB_ROOT_PASSWORD:
    file: ./secrets/DB_ROOT_PASSWORD
  OJS_DB_PASSWORD:
    file: ./secrets/OJS_DB_PASSWORD
  OJS_API_KEY_SECRET:
    file: ./secrets/OJS_API_KEY_SECRET
  OJS_SALT:
    file: ./secrets/OJS_SALT
  OJS_ADMIN_PASSWORD:
    file: ./secrets/OJS_ADMIN_PASSWORD
  OJS_SECRET_KEY:
    file: ./secrets/OJS_SECRET_KEY

services:
  init:
    image: libops/base:3.2.2.0@sha256:60c788c0dcf1fed021ee17d2847a45dde2b559ecef19b5fa11c2314356976ba9
    restart: no
    volumes:
      - ./secrets:/secrets:rw
      - ./scripts:/scripts:ro
      - ./docker-compose.yaml:/docker-compose.yaml:ro
    command: /scripts/generate-secrets.sh
    profiles: [none]

  traefik:
    <<: *common
    image: traefik:v3.7.6@sha256:21a3d83696379bac6434bb32e1dde0aff0e84ef2abd053ed3db87d3f45e749b2
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
    ports:
      - "80:80"
    volumes:
      - ./conf/traefik:/etc/traefik/dynamic:ro
    depends_on:
      ojs:
        condition: service_healthy

  ojs:
    <<: *common
    image: libops/ojs:nginx-1.30.3-php84
    build:
      context: .
      args:
        BASE_IMAGE: libops/ojs:nginx-1.30.3-php84
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OJS_OAI_REPOSITORY_ID: "localhost"
      OJS_ENABLE_BEACON: 1
      OJS_SMTP_SERVER: ${OJS_SMTP_SERVER:-host.docker.internal}
      OJS_SMTP_PORT: "${OJS_SMTP_PORT:-25}"
      OJS_DEFAULT_ENVELOPE_SENDER: ${OJS_DEFAULT_ENVELOPE_SENDER:-}
      OJS_ENABLE_HTTPS: "false"
      OJS_BASE_URL: "http://localhost"
    secrets:
      - source: DB_ROOT_PASSWORD
      - source: OJS_API_KEY_SECRET
      - source: OJS_SECRET_KEY
      - source: OJS_DB_PASSWORD
        target: DB_PASSWORD
      - source: OJS_SALT
      - source: OJS_ADMIN_PASSWORD
    volumes:
      - ojs-cache:/var/www/ojs/cache:rw
      - ojs-files:/var/www/files:rw
      - ojs-public:/var/www/ojs/public:rw
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q '^installed = On' /var/www/ojs/config.inc.php && wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10m

  mariadb:
    <<: *common
    image: libops/mariadb:11@sha256:faab6f2e647fc8fd0a2bb5d9d8632428e91bb19d22b23ce46f56007fe5af84e3
    volumes:
      - mariadb-data:/var/lib/mysql:rw
    secrets:
      - source: DB_ROOT_PASSWORD
