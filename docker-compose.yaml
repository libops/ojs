---
x-common: &common
  restart: unless-stopped
  networks:
    default:

networks:
  default:
volumes:
  acme-data: {}
  mariadb-data: {}
  ojs-cache: {}
  ojs-files: {}
  ojs-public: {}

secrets:
  DB_ROOT_PASSWORD:
    file: ./secrets/DB_ROOT_PASSWORD
  OJS_DB_PASSWORD:
    file: ./secrets/OJS_DB_PASSWORD
  OJS_API_KEY_SECRET:
    file: ./secrets/OJS_API_KEY_SECRET
  OJS_SALT:
    file: ./secrets/OJS_SALT
  OJS_ADMIN_PASSWORD:
    file: ./secrets/OJS_ADMIN_PASSWORD
  OJS_SECRET_KEY:
    file: ./secrets/OJS_SECRET_KEY

services:
  init:
    image: islandora/base:6.2.3@sha256:010f7e422ad4563f91335106215a72c7485635b0a1125c651b4e76cb6d7efbd4
    restart: no
    volumes:
      - ./secrets:/secrets:rw
      - ./scripts:/scripts:ro
      - ./docker-compose.yaml:/docker-compose.yaml:ro
    command: /scripts/generate-secrets.sh
    profiles: [none]

  traefik:
    <<: *common
    image: traefik:v3.6.13
    command:
      - --providers.file.filename=/etc/traefik/dynamic/ojs.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      TRAEFIK_TLS_ENABLED: "false"
    ports:
      - "${HOST_INSECURE_PORT:-80}:80"
    volumes:
      - ./conf/traefik/ojs.tmpl:/etc/traefik/dynamic/ojs.yml:ro
    depends_on:
      ojs:
        condition: service_healthy

  ojs:
    <<: *common
    image: ghcr.io/libops/ojs:main
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OJS_OAI_REPOSITORY_ID: ${DOMAIN:-localhost}
      OJS_ENABLE_BEACON: 1
      OJS_SMTP_SERVER: ${OJS_SMTP_SERVER:-host.docker.internal}
      OJS_SMTP_PORT: "${OJS_SMTP_PORT:-25}"
      OJS_DEFAULT_ENVELOPE_SENDER: ${OJS_DEFAULT_ENVELOPE_SENDER:-}
      OJS_ENABLE_HTTPS: "false"
      OJS_BASE_URL: "http://${DOMAIN:-localhost}"
    secrets:
      - source: DB_ROOT_PASSWORD
      - source: OJS_API_KEY_SECRET
      - source: OJS_SECRET_KEY
      - source: OJS_DB_PASSWORD
        target: DB_PASSWORD
      - source: OJS_SALT
      - source: OJS_ADMIN_PASSWORD
    volumes:
      - ojs-cache:/var/www/ojs/cache:rw
      - ojs-files:/var/www/files:rw
      - ojs-public:/var/www/ojs/public:rw
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q '^installed = On' /var/www/ojs/config.inc.php && wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10m

  mariadb:
    <<: *common
    image: islandora/mariadb:6.2.3@sha256:3c6e7cbed734310f4d9fea7a4f08e7e282ecb1a5e73aec0ab79b4167930380ab
    volumes:
      - mariadb-data:/var/lib/mysql:rw
    secrets:
      - source: DB_ROOT_PASSWORD
