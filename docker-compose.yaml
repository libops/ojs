---
x-common: &common
  restart: unless-stopped
  networks:
    default:

networks:
  default:
volumes:
  mariadb-data: {}
  ojs-files: {}
  ojs-public: {}

secrets:
  DB_ROOT_PASSWORD:
    file: ./secrets/DB_ROOT_PASSWORD
  OJS_DB_PASSWORD:
    file: ./secrets/OJS_DB_PASSWORD
  OJS_API_KEY_SECRET:
    file: ./secrets/OJS_API_KEY_SECRET
  OJS_SALT:
    file: ./secrets/OJS_SALT
  OJS_ADMIN_PASSWORD:
    file: ./secrets/OJS_ADMIN_PASSWORD
  OJS_SECRET_KEY:
    file: ./secrets/OJS_SECRET_KEY

services:
  init:
    image: libops/base:3.2.2.0@sha256:0c6bab5444d4758bb977a42c1e5199cba733c7776e1aa006f8021108a785c547
    restart: no
    working_dir: /
    volumes:
      - ./secrets:/secrets:rw,z
      - ./scripts:/scripts:ro,z
      - ./docker-compose.yaml:/docker-compose.yaml:ro,z
    command: /scripts/generate-secrets.sh
    profiles: [none]

  traefik:
    <<: *common
    image: traefik:v3.7.7@sha256:1cb3845d7a05e1473c9086351426597e911db49db382b6e4769f9b0744962ac8
    command:
      - --ping=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
    ports:
      - "80:80"
    volumes:
      - ./conf/traefik:/etc/traefik/dynamic:ro,z
    depends_on:
      ojs:
        condition: service_healthy
    healthcheck:
      test: traefik healthcheck --ping
      start_period: 10s

  ojs:
    <<: *common
    build:
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OJS_OAI_REPOSITORY_ID: "localhost"
      OJS_ENABLE_BEACON: 1
      OJS_SMTP_SERVER: ${OJS_SMTP_SERVER:-host.docker.internal}
      OJS_SMTP_PORT: "${OJS_SMTP_PORT:-25}"
      OJS_DEFAULT_ENVELOPE_SENDER: ${OJS_DEFAULT_ENVELOPE_SENDER:-}
      INGRESS_HOSTNAMES: "localhost"
      INGRESS_SCHEME: "http"
    secrets:
      - source: OJS_API_KEY_SECRET
      - source: OJS_SECRET_KEY
      - source: OJS_DB_PASSWORD
        target: DB_PASSWORD
      - source: OJS_SALT
      - source: OJS_ADMIN_PASSWORD
    volumes:
      - ojs-files:/var/www/files:rw
      - ojs-public:/var/www/ojs/public:rw
    depends_on:
      database-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /installed && grep -q '^installed = On' /var/www/ojs/config.inc.php && wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10m

  database-init:
    image: libops/base:3.2.2.0@sha256:0c6bab5444d4758bb977a42c1e5199cba733c7776e1aa006f8021108a785c547
    restart: "no"
    networks:
      default:
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: ojs
      DB_USER: ojs
      DB_CHARACTER_SET: utf8
      DB_COLLATION: utf8_general_ci
    secrets:
      - source: DB_ROOT_PASSWORD
      - source: OJS_DB_PASSWORD
        target: DB_PASSWORD
    volumes:
      - ./scripts/init-database.sh:/usr/local/bin/init-database.sh:ro,z
    entrypoint: /usr/local/bin/init-database.sh
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    <<: *common
    image: libops/mariadb:11@sha256:1b0f53f277cedf95e1fa6df25580de01dd2d0722b09f39fe0d93cfb6263e26f3
    volumes:
      - mariadb-data:/var/lib/mysql:rw
    secrets:
      - source: DB_ROOT_PASSWORD
